<head>

  <title>Snake | Barry Babbitt</title>

  <style>
    .game-wrapper {
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    .game-container {
      position: relative;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(111,183,173,0.15);
      margin-bottom: 24px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    .controls-box {
      background: rgba(47,75,79,0.3);
      border: 1px solid rgba(111,183,173,0.12);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 24px;
    }

    .controls-box h3 {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }

    .keys-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .key-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    kbd {
      display: inline-block;
      background: rgba(79,163,209,0.12);
      border: 1px solid rgba(79,163,209,0.25);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: 'Inter', monospace;
      font-size: 0.72rem;
      color: var(--accent);
      min-width: 28px;
      text-align: center;
    }

    .settings-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .setting-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .setting-group label {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .setting-group select {
      background: rgba(47,75,79,0.5);
      border: 1px solid rgba(111,183,173,0.2);
      border-radius: 4px;
      padding: 4px 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
    }

    .btn-start {
      display: inline-block;
      background: var(--accent);
      color: #0a192f;
      border: none;
      border-radius: 6px;
      padding: 8px 24px;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-start:hover { opacity: 0.85; }

    .game-status {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 8px;
    }

    .high-score {
      text-align: center;
      font-size: 0.75rem;
      color: var(--accent);
      margin-top: 4px;
    }

    @media (max-width: 600px) {
      .game-wrapper { padding: 16px 0 40px; }
      .settings-row { gap: 8px; }
      .btn-start { width: 100%; padding: 10px 24px; }
      .controls-box { padding: 12px 14px; }
      .controls-box h3 { font-size: 0.78rem; }
      .key-item { font-size: 0.74rem; }
      .keys-row { gap: 12px; }
    }
  </style>
</head>

  <div class="game-wrapper">
    <div class="controls-box">
      <h3>Controls</h3>
      <div class="keys-row">
        <div class="key-item"><kbd>&uarr;</kbd> Up</div>
        <div class="key-item"><kbd>&darr;</kbd> Down</div>
        <div class="key-item"><kbd>&larr;</kbd> Left</div>
        <div class="key-item"><kbd>&rarr;</kbd> Right</div>
      </div>
    </div>

    <div class="settings-row">
      <div class="setting-group">
        <label>Speed:</label>
        <select id="speed">
          <option value="120">Slow</option>
          <option value="80" selected>Normal</option>
          <option value="50">Fast</option>
        </select>
      </div>
      <button class="btn-start" id="start-btn">Start Game</button>
    </div>

    <div class="game-container">
      <canvas id="snake" width="600" height="600"></canvas>
    </div>
    <p class="game-status" id="status">Press Start Game to play</p>
    <p class="high-score" id="high-score"></p>
  </div>

</div>

<script>
const canvas = document.getElementById('snake');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const highScoreEl = document.getElementById('high-score');
const startBtn = document.getElementById('start-btn');

const SIZE = 600;
const GRID = 20;
const CELLS = SIZE / GRID;
const BOUNDARY = 280;

let snake = [];
let direction = { x: 1, y: 0 };
let nextDirection = { x: 1, y: 0 };
let food = { x: 0, y: 0 };
let score = 0;
let highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
let running = false;
let gameOver = false;
let interval = null;
let tickRate = 80;

if (highScore > 0) highScoreEl.textContent = `Best: ${highScore}`;

const spawnFood = () => {
  let valid = false;
  while (!valid) {
    food.x = Math.floor(Math.random() * (CELLS - 2)) + 1;
    food.y = Math.floor(Math.random() * (CELLS - 2)) + 1;
    valid = !snake.some(seg => seg.x === food.x && seg.y === food.y);
  }
};

const reset = () => {
  const mid = Math.floor(CELLS / 2);
  snake = [
    { x: mid, y: mid },
    { x: mid - 1, y: mid },
    { x: mid - 2, y: mid }
  ];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  gameOver = false;
  spawnFood();
};

const update = () => {
  direction = { ...nextDirection };

  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

  // Boundary check
  if (head.x < 0 || head.x >= CELLS || head.y < 0 || head.y >= CELLS) {
    return endGame();
  }

  // Self-collision
  if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
    return endGame();
  }

  snake.unshift(head);

  // Food collision
  if (head.x === food.x && head.y === food.y) {
    score++;
    spawnFood();
  } else {
    snake.pop();
  }

  draw();
};

const draw = () => {
  // Background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, SIZE, SIZE);

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= CELLS; i++) {
    ctx.beginPath();
    ctx.moveTo(i * GRID, 0);
    ctx.lineTo(i * GRID, SIZE);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * GRID);
    ctx.lineTo(SIZE, i * GRID);
    ctx.stroke();
  }

  // Snake
  snake.forEach((seg, i) => {
    const alpha = 1 - (i / snake.length) * 0.5;
    ctx.fillStyle = i === 0 ? '#D9FFF6' : `rgba(111,183,173,${alpha})`;
    ctx.fillRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2);
  });

  // Food
  ctx.fillStyle = '#4FA3D1';
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
  ctx.fill();

  // Score
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = 'bold 18px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`Score: ${score}`, SIZE / 2, 24);
};

const endGame = () => {
  running = false;
  gameOver = true;
  clearInterval(interval);

  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snakeHighScore', String(highScore));
  }

  draw();
  ctx.fillStyle = '#4FA3D1';
  ctx.font = 'bold 36px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER!', SIZE / 2, SIZE / 2 + 12);

  statusEl.textContent = `Game Over — Score: ${score}`;
  highScoreEl.textContent = `Best: ${highScore}`;
  startBtn.textContent = 'Play Again';
};

// Input
document.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();

  switch (e.key) {
    case 'ArrowUp':
      if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
      break;
    case 'ArrowDown':
      if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
      break;
    case 'ArrowLeft':
      if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
      break;
    case 'ArrowRight':
      if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
      break;
  }
});

// Initial draw
reset();
draw();

startBtn.addEventListener('click', () => {
  if (running) return;

  tickRate = parseInt(document.getElementById('speed').value);
  reset();
  running = true;
  startBtn.textContent = 'Playing...';
  statusEl.textContent = 'Use arrow keys to steer';
  interval = setInterval(update, tickRate);
});
</script>

</body>
